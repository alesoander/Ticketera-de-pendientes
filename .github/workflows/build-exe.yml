name: Build Windows EXE

on:
  push:
    tags:
      - "v*"          # triggered on version tags, e.g. v1.0.0
  workflow_dispatch:  # allow manual trigger from the Actions tab

permissions:
  contents: write   # needed to create GitHub Releases and upload release assets

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable with PyInstaller
        run: pyinstaller ticketera.spec

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ticketera-windows
          path: dist/ticketera.exe
          if-no-files-found: error

      # On version-tag pushes also create a GitHub Release and attach the .exe
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ticketera.exe
          generate_release_notes: true
